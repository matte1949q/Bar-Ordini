<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FurbyRosa">
  <meta name="theme-color" content="#e8c4b2">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>FurbyRosa</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #e8c4b2;
      --bg2: #f5e6de;
      --bg3: #ddb8a4;
      --border: rgba(120,70,50,0.12);
      --border2: rgba(120,70,50,0.22);
      --text: #2e1a12;
      --text2: #7a5246;
      --text3: #b08070;
      --accent: #b04a2a;
      --accent2: #8c3820;
      --green: #3a7a52;
      --green-bg: rgba(58,122,82,0.12);
      --red: #c0392b;
      --red-bg: rgba(192,57,43,0.10);
      --amber-bg: rgba(176,74,42,0.10);
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body { display: flex; flex-direction: column; min-height: 100dvh; }

    header {
      padding: 16px 20px 12px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 17px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .logo span { color: var(--text2); font-weight: 400; }

    nav {
      display: flex;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 57px;
      z-index: 9;
    }

    nav button {
      flex: 1;
      padding: 12px 8px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text3);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }

    nav button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 40px; }

    .page { display: none; }
    .page.active { display: block; }

    .card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 12px;
    }

    .upload-zone {
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius);
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      background: rgba(255,255,255,0.25);
    }

    .upload-zone:active { background: rgba(255,255,255,0.38); }

    .upload-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      background: var(--bg3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .upload-icon svg { width: 22px; height: 22px; stroke: var(--accent); }

    .upload-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
    .upload-sub { font-size: 13px; color: var(--text2); }

    .preview-wrap { position: relative; margin-bottom: 12px; }
    .preview-img {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: var(--radius);
      background: var(--bg3);
      display: block;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: #1a1a18; }
    .btn-primary:disabled { background: var(--bg3); color: var(--text3); }
    .btn-secondary { background: var(--bg3); color: var(--text2); border: 0.5px solid var(--border2); }
    .btn + .btn { margin-top: 8px; }

    .progress-wrap { height: 3px; background: var(--bg3); border-radius: 2px; margin: 12px 0; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

    .result-table { width: 100%; border-collapse: collapse; }
    .result-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text3);
      padding: 8px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .result-table td { padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
    .result-table tr:last-child td { border-bottom: none; }

    .mono { font-family: 'DM Mono', monospace; font-size: 13px; }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 99px;
      letter-spacing: 0.04em;
    }
    .badge-new { background: var(--green-bg); color: var(--green); }
    .badge-up { background: var(--red-bg); color: var(--red); }
    .badge-down { background: var(--green-bg); color: var(--green); }
    .badge-same { background: var(--bg3); color: var(--text3); }

    .error-box {
      background: var(--red-bg);
      border: 0.5px solid rgba(196,84,74,0.3);
      color: var(--red);
      border-radius: var(--radius-sm);
      padding: 12px;
      font-size: 13px;
      margin: 10px 0;
    }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .stat-card {
      background: var(--bg3);
      border-radius: var(--radius-sm);
      padding: 14px;
    }
    .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
    .stat-value { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: var(--text); }

    .product-row {
      padding: 12px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .product-row:last-child { border-bottom: none; }
    .product-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .product-meta { font-size: 12px; color: var(--text2); display: flex; justify-content: space-between; align-items: center; }
    .product-price { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--accent); }
    .checkbox-product {
      width: 18px; height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .bulk-bar {
      position: sticky;
      bottom: 0;
      background: var(--bg2);
      border-top: 0.5px solid var(--border2);
      padding: 12px 0;
      display: none;
      gap: 8px;
      margin-top: 12px;
    }
    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text3);
      line-height: 1;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .delete-btn:hover { color: var(--red); }

    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--text3); pointer-events: none; }
    .search-input {
      width: 100%;
      padding: 11px 12px 11px 36px;
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
    }
    .search-input:focus { border-color: var(--border2); }
    .search-input::placeholder { color: var(--text3); }

    .sync-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .sync-ok { background: var(--green); }
    .sync-err { background: var(--red); }
    .sync-pending { background: var(--accent); animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
    .empty svg { width: 40px; height: 40px; stroke: var(--text3); margin: 0 auto 12px; display: block; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3);
      border: 0.5px solid var(--border2);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.2s;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-header-title { font-size: 13px; font-weight: 500; color: var(--text2); }

    input[type="file"] { display: none; }

    .lock-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 40px 24px;
    }
    .lock-logo {
      font-family: 'DM Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .lock-logo span { color: var(--text2); font-weight: 400; }
    .lock-sub { font-size: 14px; color: var(--text2); margin-bottom: 40px; }
    .lock-input {
      width: 100%;
      max-width: 300px;
      padding: 14px 16px;
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      text-align: center;
      letter-spacing: 0.1em;
      outline: none;
      margin-bottom: 12px;
    }
    .lock-input:focus { border-color: var(--accent); }
    .lock-btn {
      width: 100%;
      max-width: 300px;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    .lock-error {
      font-size: 13px;
      color: var(--red);
      margin-top: 10px;
      min-height: 20px;
    }
  </style>
<script>
const APP_PASSWORD = 'furby2024';

function checkPassword() {
  const val = document.getElementById('lock-input').value;
  if (val === APP_PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    sessionStorage.setItem('auth', '1');
  } else {
    document.getElementById('lock-error').textContent = 'Password errata. Riprova.';
    document.getElementById('lock-input').value = '';
    document.getElementById('lock-input').focus();
  }
}

document.addEventListener('DOMContentLoaded', function() {
  if (sessionStorage.getItem('auth') === '1') {
    document.getElementById('lock-screen').style.display = 'none';
  }
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
</script>
</head>
<body>


<div class="lock-screen" id="lock-screen">
  <div class="lock-logo">Furby<span>Rosa</span></div>
  <div class="lock-sub">Accesso riservato al personale</div>
  <input type="password" class="lock-input" id="lock-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPassword()">
  <button class="lock-btn" onclick="checkPassword()">Entra</button>
  <div class="lock-error" id="lock-error"></div>
</div>

<header>
  <div class="logo">Furby<span>Rosa</span></div>
  <div style="font-size:12px;color:var(--text3);display:flex;align-items:center;">
    <span class="sync-dot sync-ok" id="sync-dot"></span>
    <span id="sync-label">connesso</span>
  </div>
</header>

<nav>
  <button class="active" onclick="showPage('scan')">Scansiona</button>
  <button onclick="showPage('prezzi')">Prezzi</button>
  <button onclick="showPage('storico')">Storico</button>
</nav>

<main>

  <!-- SCAN PAGE -->
  <div class="page active" id="page-scan">

    <div id="upload-area">
      <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="m21 15-5-5L5 21"/>
          </svg>
        </div>
        <div class="upload-title">Fotografa la bolla</div>
        <div class="upload-sub">Tocca per scattare, scegli dalla galleria o carica un PDF</div>
      </div>
      <input type="file" id="file-input" accept="image/*,application/pdf" onchange="handleFile(this.files[0])">
    </div>

    <div id="preview-area" style="display:none">
      <div class="preview-wrap">
        <img id="preview-img" class="preview-img" src="" alt="bolla">
      </div>
      <button class="btn btn-primary" id="scan-btn" onclick="scanImage()">Analizza bolla</button>
      <button class="btn btn-secondary" onclick="resetScan()">Cambia foto</button>
      <div class="progress-wrap" id="progress-wrap" style="display:none">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div id="error-box" style="display:none" class="error-box"></div>
    </div>

    <div id="results-area" style="display:none; margin-top:20px;">
      <div class="section-header">
        <span class="section-header-title" id="results-count"></span>
        <span id="saving-label" style="font-size:12px;color:var(--text3)"></span>
      </div>
      <div class="card" style="padding:0 16px;">
        <table class="result-table">
          <thead>
            <tr>
              <th>Prodotto</th>
              <th style="text-align:right;">Prezzo</th>
              <th style="text-align:right;">Stato</th>
            </tr>
          </thead>
          <tbody id="results-tbody"></tbody>
        </table>
      </div>
      <button class="btn btn-secondary" onclick="resetScan()" style="margin-top:4px;">Scansiona un'altra bolla</button>
    </div>

  </div>

  <!-- PREZZI PAGE -->
  <div class="page" id="page-prezzi">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Prodotti</div>
        <div class="stat-value" id="stat-prodotti">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Fornitori</div>
        <div class="stat-value" id="stat-fornitori">—</div>
      </div>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" class="search-input" id="search-input" placeholder="Cerca prodotto o fornitore…" oninput="renderPrezzi()">
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;" id="select-bar" style="display:none">

        <input type="checkbox" id="select-all-cb" class="checkbox-product" onchange="toggleSelectAll(this.checked)"> Seleziona tutti
      </label>

    </div>

    <div id="prezzi-list">
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>

      </div>
    </div>
  <div class="bulk-bar" id="bulk-bar">
      <button class="btn btn-secondary" onclick="deleteSelected()" style="background:var(--red-bg);color:var(--red);border-color:rgba(192,57,43,0.3);">Elimina selezionati</button>

  <!-- STORICO PAGE -->
  <div class="page" id="page-storico">
    <div id="storico-list">

        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>

        Nessuna scansione ancora.
      </div>
    </div>

</main>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://dbkmjhognkcseoqqamje.supabase.co';
const SUPABASE_KEY = 'sb_publishable_K5bDHDSPWJL9XYZd7hhjfQ_0JoTlK1O';
const ANTHROPIC_KEY = 'INSERISCI_QUI_LA_TUA_CHIAVE';

let db;
function initSupabase() {
  db = window._supabaseCreateClient(SUPABASE_URL, SUPABASE_KEY);
  init();
}
window.addEventListener('supabase-ready', initSupabase);

let allPrezzi = [];
let allStorico = [];
let currentImageBase64 = null;
let currentImageMime = 'image/jpeg';

async function init() {
  await loadPrezzi();
  await loadStorico();
  checkSync();
}

async function checkSync() {
  try {
    await db.from('prezzi').select('id').limit(1);
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('err');
  }
}

function setSyncStatus(s) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = 'sync-dot sync-' + s;
  label.textContent = s === 'ok' ? 'connesso' : s === 'err' ? 'offline' : 'sync…';
}

async function loadPrezzi() {
  try {
    const { data } = await db.from('prezzi').select('*').order('prodotto');
    allPrezzi = data || [];
    renderPrezzi();
    updateStats();
  } catch(e) {}
}

async function loadStorico() {
  try {
    const { data } = await db.from('storico').select('*').order('created_at', { ascending: false }).limit(100);
    allStorico = data || [];
    renderStorico();
  } catch(e) {}
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'prezzi') { loadPrezzi(); }
  if (name === 'storico') { loadStorico(); }
}

function compressAndShow(dataUrl) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    let w = img.width, h = img.height;
    const maxDim = 2000;
    if (w > maxDim || h > maxDim) {
      if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
      else { w = Math.round(w * maxDim / h); h = maxDim; }
    }
    canvas.width = w;
    canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    let quality = 0.85;
    let out = canvas.toDataURL('image/jpeg', quality);
    while (out.length * 0.75 > 4.5 * 1024 * 1024 && quality > 0.4) {
      quality -= 0.1;
      out = canvas.toDataURL('image/jpeg', quality);
    }
    currentImageBase64 = out.split(',')[1];
    currentImageMime = 'image/jpeg';
    document.getElementById('preview-img').src = out;
    document.getElementById('upload-area').style.display = 'none';
    document.getElementById('preview-area').style.display = 'block';
    document.getElementById('results-area').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';
  };
  img.src = dataUrl;
}

async function handlePDF(file) {
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const totalPages = pdf.numPages;

    if (totalPages === 1) {
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 2.0 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      compressAndShow(canvas.toDataURL('image/jpeg', 0.9));
    } else {
      // Multi-page: render all pages into one tall canvas
      const pages = [];
      let totalHeight = 0;
      let maxWidth = 0;
      for (let i = 1; i <= totalPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 2.0 });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        pages.push(canvas);
        totalHeight += viewport.height;
        if (viewport.width > maxWidth) maxWidth = viewport.width;
      }
      const combined = document.createElement('canvas');
      combined.width = maxWidth;
      combined.height = totalHeight;
      const ctx = combined.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, maxWidth, totalHeight);
      let y = 0;
      for (const p of pages) { ctx.drawImage(p, 0, y); y += p.height; }
      compressAndShow(combined.toDataURL('image/jpeg', 0.85));
    }
  } catch(e) {
    showError('Errore lettura PDF: ' + e.message);
  }
}

function handleFile(file) {
  if (!file) return;
  if (file.type === 'application/pdf') {
    handlePDF(file);
    return;
  }
  currentImageMime = 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => compressAndShow(e.target.result);
  reader.readAsDataURL(file);
}

function resetScan() {
  currentImageBase64 = null;
  document.getElementById('file-input').value = '';
  document.getElementById('upload-area').style.display = 'block';
  document.getElementById('preview-area').style.display = 'none';
  document.getElementById('results-area').style.display = 'none';
}

function setLoading(on) {
  const btn = document.getElementById('scan-btn');
  const pw = document.getElementById('progress-wrap');
  const pb = document.getElementById('progress-bar');
  if (on) {
    btn.disabled = true;
    btn.textContent = 'Analisi in corso…';
    pw.style.display = 'block';
    let w = 0;
    btn._iv = setInterval(() => {
      w = Math.min(w + Math.random() * 10, 85);
      pb.style.width = w + '%';
    }, 400);
  } else {
    clearInterval(btn._iv);
    pb.style.width = '100%';
    setTimeout(() => { pw.style.display = 'none'; pb.style.width = '0%'; }, 500);
    btn.disabled = false;
    btn.textContent = 'Analizza bolla';
  }
}

async function scanImage() {
  if (!currentImageBase64) return;
  setLoading(true);
  document.getElementById('error-box').style.display = 'none';

  const prompt = `Sei un assistente per la gestione degli ordini di un bar italiano.
Analizza questa immagine di una bolla/proforma/fattura e estrai i prodotti ordinati.

REGOLE IMPORTANTI:
1. Il fornitore e' il nome dell'azienda intestataria del documento (es. "Fine Spirits S.R.L.")
2. La colonna piu' a sinistra contiene i CODICI ARTICOLO (es. A04966, KD114, A00052, P01944). Ogni codice identifica un nuovo prodotto.
3. Un prodotto INIZIA quando trovi un nuovo codice articolo nella colonna sinistra. Tutto il testo nelle righe successive SENZA codice appartiene al prodotto precedente e va concatenato. Esempio: KDI14 con "KILCHOMAN 100% ISLAY 14TH" e riga sotto "RELEASE 2024 50° CL 70" = nome completo "KILCHOMAN 100% ISLAY 14TH RELEASE 2024 50° CL 70".
4. Ignora TUTTE le righe senza codice articolo che contengono: note logistiche, avvisi, numeri di telefono, date, riferimenti ordini, "CONSEGNA IN CANTINA", "PRONTA CONSEGNA", "PREAV ALMENO UN ORA PRIMA", "CONSEGNA ENTRO IL", codici numerici come 3385400345, righe che iniziano con "Promo:" o "ACTION ON TRADE" o "FEVER AD PRODUCTUM" o simili promozioni.
5. Ignora prodotti con prezzo 0,00 o con scritta "SCONTO MERCE" nella colonna prezzo — sono omaggi senza valore commerciale.
6. Per il prezzo usa SEMPRE il prezzo LORDO (prima dello sconto), ovvero la colonna "PREZZO" o "Valore" o "ValUnNe". NON usare mai il prezzo scontato (colonna "ValUnNe" o "SCONTO" o valori ridotti). Se vedi sia un prezzo pieno che uno scontato, prendi SEMPRE quello pieno. NON usare il totale riga.
7. Per l'unita' usa il valore nella colonna "U.M." (BT = bottiglia, PZ = pezzo).
8. NORMALIZZA il nome prodotto: converti tutto in MAIUSCOLO e rimuovi spazi doppi, cosi prodotti uguali su bolle diverse vengono riconosciuti come identici.
9. Scrivi sempre "cl" in MINUSCOLO nel nome prodotto, mai "CL" o "Cl".
10. Se la descrizione riporta misure in ml, convertile in cl dividendo per 10 e usa "cl". Esempi: 200ml = 20 cl, 500ml = 50 cl, 750ml = 75 cl, 1000ml = 100 cl. Scrivi sempre il risultato come "XX cl" (minuscolo).

Rispondi SOLO con un array JSON valido, senza markdown, senza backtick, senza spiegazioni.
Formato esatto:
[{"fornitore":"nome fornitore","prodotto":"NOME PRODOTTO IN MAIUSCOLO","prezzo":0.00,"unita":"BT"}]

Se non ci sono prodotti con codice articolo restituisci [].
Se l'immagine non e' una bolla restituisci {"errore":"non riconoscibile"}.`;

  try {
    const res = await fetch('https://furbyrosa.matte1949q.workers.dev/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: currentImageMime, data: currentImageBase64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    const responseText = await res.text();
    console.log('Worker response:', responseText);
    
    let data;
    try { data = JSON.parse(responseText); } catch(e) { showError('Risposta non valida dal server: ' + responseText.slice(0,100)); setLoading(false); return; }
    
    if (data.error) { showError('Errore server: ' + (data.error.message || data.error)); setLoading(false); return; }
    
    const raw = (data.content || []).map(i => i.text || '').join('').trim().replace(/```json|```/g, '').trim();
    console.log('Raw AI response:', raw);
    
    if (!raw) { showError('Risposta vuota dal modello AI.'); setLoading(false); return; }
    
    let parsed;
    try { parsed = JSON.parse(raw); } catch(e) { showError('Formato risposta non valido: ' + raw.slice(0,100)); setLoading(false); return; }

    if (parsed.errore) { showError("L'immagine non sembra una bolla. Riprova con un'altra foto."); setLoading(false); return; }
    if (!Array.isArray(parsed) || parsed.length === 0) { showError('Nessun prodotto trovato. Prova con una foto piu nitida.'); setLoading(false); return; }

    await saveResults(parsed);
    setLoading(false);
  } catch(e) {
    showError('Errore: ' + e.message);
    console.error('Scan error:', e);
    setLoading(false);
  }
}

async function saveResults(items) {
  setSyncStatus('pending');
  document.getElementById('saving-label').textContent = 'Salvataggio…';

  const tbody = document.getElementById('results-tbody');
  tbody.innerHTML = '';
  const statuses = [];

  for (const item of items) {
    if (!item.prodotto) continue;
    const key = (item.fornitore || '').toLowerCase().trim() + '|' + item.prodotto.toLowerCase().trim();

    const existing = allPrezzi.find(p =>
      p.prodotto.toLowerCase().trim() === (item.prodotto || '').toLowerCase().trim() &&
      (p.fornitore || '').toLowerCase().trim() === (item.fornitore || '').toLowerCase().trim()
    );

    let status = 'nuovo';
    let prevPrice = null;

    if (existing) {
      prevPrice = existing.prezzo;
      if (existing.prezzo === item.prezzo) status = 'invariato';
      else if (item.prezzo > existing.prezzo) status = 'aumentato';
      else status = 'diminuito';
    }

    statuses.push({ ...item, status, prevPrice });

    const tr = document.createElement('tr');
    const badgeClass = status === 'nuovo' ? 'badge-new' : status === 'aumentato' ? 'badge-up' : status === 'diminuito' ? 'badge-down' : 'badge-same';
    const badgeText = status === 'nuovo' ? 'nuovo' : status === 'aumentato' ? '▲ su' : status === 'diminuito' ? '▼ giù' : '=';
    tr.innerHTML = `
      <td>
        <div style="font-weight:500;font-size:14px;">${item.prodotto || '—'}</div>
        <div style="font-size:11px;color:var(--text3);">${item.fornitore || ''}</div>
      </td>
      <td style="text-align:right;" class="mono">€${item.prezzo != null ? Number(item.prezzo).toFixed(2) : '—'}</td>
      <td style="text-align:right;"><span class="badge ${badgeClass}">${badgeText}</span></td>
    `;
    tbody.appendChild(tr);
  }

  try {
    const now = new Date().toISOString();

    for (const item of statuses) {
      const upsertData = {
        prodotto: item.prodotto,
        fornitore: item.fornitore || null,
        prezzo: item.prezzo,
        unita: item.unita || null,
        updated_at: now
      };
      await db.from('prezzi').upsert(upsertData, { onConflict: 'prodotto,fornitore' });
    }

    await db.from('storico').insert({
      items: statuses,
      created_at: now,
      n_prodotti: statuses.length
    });

    setSyncStatus('ok');
    document.getElementById('saving-label').textContent = 'Salvato ✓';
    showToast('Dati salvati e condivisi');
    await loadPrezzi();
    await loadStorico();
  } catch(e) {
    setSyncStatus('err');
    document.getElementById('saving-label').textContent = 'Errore salvataggio';
    showToast('Dati salvati solo in locale');
  }

  document.getElementById('results-count').textContent = statuses.length + ' prodott' + (statuses.length === 1 ? 'o' : 'i') + ' rilevati';
  document.getElementById('results-area').style.display = 'block';
  document.getElementById('preview-area').querySelector('.btn-secondary').style.display = 'none';
}

function updateSelection() {
  const cbs = document.querySelectorAll('.product-cb');
  const checked = document.querySelectorAll('.product-cb:checked');
  const bulkBar = document.getElementById('bulk-bar');
  const selectAllCb = document.getElementById('select-all-cb');
  const countEl = document.getElementById('selected-count');
  bulkBar.style.display = checked.length > 0 ? 'flex' : 'none';
  selectAllCb.checked = cbs.length > 0 && checked.length === cbs.length;
  countEl.textContent = checked.length > 0 ? checked.length + ' selezionati' : '';
}

function toggleSelectAll(checked) {
  document.querySelectorAll('.product-cb').forEach(cb => cb.checked = checked);
  updateSelection();
}

function clearSelection() {
  document.querySelectorAll('.product-cb').forEach(cb => cb.checked = false);
  document.getElementById('select-all-cb').checked = false;
  updateSelection();
}

async function deleteSelected() {
  const checked = document.querySelectorAll('.product-cb:checked');
  if (!checked.length) return;
  if (!confirm('Eliminare ' + checked.length + ' prodotti selezionati?')) return;
  const ids = Array.from(checked).map(cb => parseInt(cb.dataset.id));
  try {
    await db.from('prezzi').delete().in('id', ids);
    allPrezzi = allPrezzi.filter(p => !ids.includes(p.id));
    renderPrezzi();
    updateStats();
    showToast(ids.length + ' prodotti eliminati');
  } catch(e) {
    showToast('Errore eliminazione');
  }
}

async function deleteProduct(id) {
  if (!confirm('Eliminare questo prodotto?')) return;
  try {
    await db.from('prezzi').delete().eq('id', id);
    allPrezzi = allPrezzi.filter(p => p.id !== id);
    renderPrezzi();
    updateStats();
    showToast('Prodotto eliminato');
  } catch(e) {
    showToast('Errore eliminazione');
  }
}

function renderPrezzi() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const list = document.getElementById('prezzi-list');
  const filtered = allPrezzi.filter(p =>
    !q || (p.prodotto || '').toLowerCase().includes(q) || (p.fornitore || '').toLowerCase().includes(q)
  );

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>' + (q ? 'Nessun risultato.' : 'Nessun prodotto ancora.') + '</div>';
    return;
  }

  let by = {};
  filtered.forEach(p => {
    const f = p.fornitore || 'Senza fornitore';
    if (!by[f]) by[f] = [];
    by[f].push(p);
  });

  list.innerHTML = Object.entries(by).map(([fornitore, prods]) => `
    <div class="card" style="padding: 0 16px; margin-bottom:10px;">
      <div style="padding:12px 0 8px;font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--accent);border-bottom:0.5px solid var(--border);">${fornitore}</div>
      ${prods.map(p => `
        <div class="product-row">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
            <input type="checkbox" class="checkbox-product product-cb" data-id="${p.id}" onchange="updateSelection()">
            <div style="flex:1;">
              <div class="product-name">${p.prodotto}</div>
              <div class="product-meta">
                <span style="color:var(--text3);">${p.unita || ''} · ${p.updated_at ? new Date(p.updated_at).toLocaleDateString('it-IT') : ''}</span>
                <span class="product-price">€${p.prezzo != null ? Number(p.prezzo).toFixed(2) : '—'}</span>
              </div>
            </div>
            <button class="delete-btn" onclick="deleteProduct(${p.id})" title="Elimina">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
              </svg>
            </button>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

async function deleteStorico(id) {
  if (!confirm('Eliminare questa scansione dallo storico?')) return;
  try {
    await db.from('storico').delete().eq('id', id);
    allStorico = allStorico.filter(s => s.id !== id);
    renderStorico();
    showToast('Scansione eliminata');
  } catch(e) {
    showToast('Errore eliminazione');
  }
}

function renderStorico() {
  const list = document.getElementById('storico-list');
  if (!allStorico.length) {
    list.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Nessuna scansione ancora.</div>';
    return;
  }
  list.innerHTML = allStorico.map(s => {
    const date = new Date(s.created_at);
    const dateStr = date.toLocaleDateString('it-IT', { day:'2-digit', month:'short', year:'numeric' });
    const timeStr = date.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
    const items = s.items || [];
    const nuovi = items.filter(i => i.status === 'nuovo').length;
    const variati = items.filter(i => i.status === 'aumentato' || i.status === 'diminuito').length;
    return `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
          <div style="flex:1;">
            <div style="font-weight:500;font-size:15px;">${dateStr}</div>
            <div style="font-size:12px;color:var(--text3);">${timeStr}</div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;">
            <div style="text-align:right;">
              <div class="mono" style="font-size:16px;color:var(--accent);">${s.n_prodotti || items.length}</div>
              <div style="font-size:11px;color:var(--text3);">prodotti</div>
            </div>
            <button class="delete-btn" onclick="deleteStorico(${s.id})" title="Elimina">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
              </svg>
            </button>
          </div>
        </div>
        ${nuovi || variati ? `<div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${nuovi ? `<span class="badge badge-new">${nuovi} nuov${nuovi===1?'o':'i'}</span>` : ''}
          ${variati ? `<span class="badge badge-up">${variati} variazion${variati===1?'e':'i'}</span>` : ''}
        </div>` : ''}
      </div>
    `;
  }).join('');
}

function updateStats() {
  document.getElementById('stat-prodotti').textContent = allPrezzi.length;
  const fornitori = new Set(allPrezzi.map(p => p.fornitore).filter(Boolean));
  document.getElementById('stat-fornitori').textContent = fornitori.size;
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = msg;
  box.style.display = 'block';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}



</script>
</body>
